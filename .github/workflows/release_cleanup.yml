name: Release cleanup

on:
  workflow_dispatch:
    inputs:
      keep:
        description: "How many latest releases to keep"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Keep latest releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          KEEP: ${{ github.event.inputs.keep || '2' }}
        shell: bash
        run: |
          gh release list --limit 100 --json tagName,isDraft,createdAt \
            --jq "[.[] | select(.isDraft == false)] | sort_by(.createdAt) | reverse | .[$KEEP:] | .[].tagName" |
          while read -r tag; do
            [ -z "$tag" ] && continue
            gh release delete "$tag" -y --cleanup-tag
          done
