name: actit_pass_storage
description: "ActitPassStorage: локальный менеджер паролей, заметок и карточек."
publish_to: "none"
version: 0.1.12+13

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  pointycastle: ^3.9.1
  sqlite3: ^2.7.6
  sqlite3_flutter_libs: ^0.5.32

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    # Original SPB Wallet libraries. Keep every source filename unchanged:
    # legacy databases refer to stable template/icon identities.
    - assets/spb_wallet_libraries/templates/
    - assets/spb_wallet_libraries/icons/
    - assets/spb_wallet_libraries/icons/card_images_bmp/
    - assets/spb_wallet_libraries/icons/card_images_png/
    - assets/spb_wallet_libraries/icons/apk_icons/res/drawable-hdpi/
    - assets/spb_wallet_libraries/icons/apk_icons/res/drawable-large-hdpi/
    - assets/spb_wallet_libraries/icons/apk_icons/res/drawable-large-mdpi/
    - assets/spb_wallet_libraries/icons/apk_icons/res/drawable-ldpi/
    - assets/spb_wallet_libraries/icons/apk_icons/res/drawable-mdpi/
